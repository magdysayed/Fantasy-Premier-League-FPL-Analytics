name: Auto Update FPL Data

on:
  schedule:
    - cron: "0 4 * * *" # بيشتغل 7 الصبح بتوقيت الرياض
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    # إضافة صلاحيات الكتابة عشان يقدر يرفع الملف الجديد للمستودع
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # تحديث للإصدار الرابع أضمن

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # بيساعد في تنظيم المكتبات ومنع التداخل

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Scraper
        run: python scraper.py 

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add clean_fpl_analysis.csv
          # الـ || exit 0 عشان لو مفيش تغيير في البيانات الـ Action ميفشلش
          git commit -m "Update FPL Data: $(date)" || exit 0
          git push
