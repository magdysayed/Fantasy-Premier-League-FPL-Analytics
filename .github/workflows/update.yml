name: Auto Update FPL Data

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: 

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Force Clean Environment
        run: |
          pip cache purge
          # التأكد من مسح أي بقايا لمكتبة soccerdata لو موجودة
          pip uninstall soccerdata seleniumbase -y || true

      - name: Install Necessary Libraries
        run: |
          pip install pandas requests

      - name: Run Scraper
        # السطر ده بيتأكد إنه بيشغل الملف اللي في المجلد الحالي
        run: python ./scraper.py 

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add clean_fpl_analysis.csv
          git commit -m "Update FPL Data: $(date)" || exit 0
          git push
